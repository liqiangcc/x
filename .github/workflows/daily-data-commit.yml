name: Daily Data Commit

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Optional YYYYMMDD date. Empty means latest."
        required: false
        default: ""
      period:
        description: "Kline period."
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - yearly
      limit:
        description: "Maximum number of codes to sync."
        required: false
        default: ""
      batch_size:
        description: "Maximum missing codes to process in this run. Empty uses stable defaults."
        required: false
        default: ""
      concurrency:
        description: "Kline fetch concurrency. Empty uses stable defaults."
        required: false
        default: ""
      retry_attempts:
        description: "Retry attempts for transient kline failures. Empty uses stable defaults."
        required: false
        default: ""
      retry_concurrency:
        description: "Retry concurrency. Empty uses stable defaults."
        required: false
        default: ""
      min_success_rate:
        description: "Minimum kline success rate for each batch. Empty uses stable default."
        required: false
        default: ""
      force:
        description: "Force refresh existing kline files."
        required: false
        default: false
        type: boolean
      universe:
        description: "Code universe for kline sync."
        required: false
        default: "market"
        type: choice
        options:
          - market
          - pool
      engine:
        description: "Kline engine."
        required: false
        default: "aws"
        type: choice
        options:
          - auto
          - local
          - aws
      aws_region:
        description: "Comma-separated AWS Lambda regions. Empty uses config rotation."
        required: false
        default: ""
      lambda_name:
        description: "Lambda function name. Empty uses kline."
        required: false
        default: ""
      config:
        description: "Optional kline config file."
        required: false
        default: ""
      job_mode:
        description: "Batch mode chains workflow runs until the market universe is complete."
        required: false
        default: "batch"
        type: choice
        options:
          - batch
          - single
      job_id:
        description: "Existing job id to resume. Empty creates a deterministic job id."
        required: false
        default: ""
      chain_depth:
        description: "Internal chained run depth. Leave empty for manual first run."
        required: false
        default: ""
      max_chain_depth:
        description: "Internal chained run limit. Empty computes from universe size and batch size."
        required: false
        default: ""
  schedule:
    - cron: "30 8 * * 1-5"

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: daily-data-commit
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        if: ${{ github.event_name == 'schedule' || github.event.inputs.engine == '' || github.event.inputs.engine == 'aws' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

      - name: AWS kline preflight
        if: ${{ github.event_name == 'schedule' || github.event.inputs.engine == '' || github.event.inputs.engine == 'aws' }}
        run: node bin/x kline fetch 600519 --period daily --engine aws > /tmp/kline-aws-preflight.json

      - name: Run daily data workflow
        env:
          DATE_INPUT: ${{ github.event.inputs.date }}
          PERIOD_INPUT: ${{ github.event.inputs.period }}
          LIMIT_INPUT: ${{ github.event.inputs.limit }}
          BATCH_SIZE_INPUT: ${{ github.event.inputs.batch_size }}
          CONCURRENCY_INPUT: ${{ github.event.inputs.concurrency }}
          RETRY_ATTEMPTS_INPUT: ${{ github.event.inputs.retry_attempts }}
          RETRY_CONCURRENCY_INPUT: ${{ github.event.inputs.retry_concurrency }}
          MIN_SUCCESS_RATE_INPUT: ${{ github.event.inputs.min_success_rate }}
          FORCE_INPUT: ${{ github.event.inputs.force }}
          UNIVERSE_INPUT: ${{ github.event.inputs.universe }}
          ENGINE_INPUT: ${{ github.event.inputs.engine }}
          AWS_REGION_INPUT: ${{ github.event.inputs.aws_region }}
          LAMBDA_NAME_INPUT: ${{ github.event.inputs.lambda_name }}
          CONFIG_INPUT: ${{ github.event.inputs.config }}
          JOB_MODE_INPUT: ${{ github.event.inputs.job_mode }}
          JOB_ID_INPUT: ${{ github.event.inputs.job_id }}
          CHAIN_DEPTH_INPUT: ${{ github.event.inputs.chain_depth }}
          MAX_CHAIN_DEPTH_INPUT: ${{ github.event.inputs.max_chain_depth }}
          GH_TOKEN: ${{ github.token }}
        run: node scripts/github-daily-workflow.js
