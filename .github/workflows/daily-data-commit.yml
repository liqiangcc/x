name: Daily Data Commit

on:
  workflow_dispatch:
    inputs:
      date:
        description: "同步日期 YYYYMMDD；留空表示自动使用最新交易日。"
        required: false
        default: ""
      period:
        description: "K线周期：daily=日线，yearly=年线。"
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - yearly
      limit:
        description: "调试用：最多同步多少只股票；留空表示全市场。"
        required: false
        default: ""
      batch_size:
        description: "每轮处理股票数；留空默认 100。"
        required: false
        default: ""
      concurrency:
        description: "抓取并发数；留空默认 4。"
        required: false
        default: ""
      retry_attempts:
        description: "失败重试次数；留空默认日线 3、年线 5。"
        required: false
        default: ""
      retry_concurrency:
        description: "重试并发数；留空默认 1。"
        required: false
        default: ""
      min_success_rate:
        description: "每轮最低成功率；留空默认 0.95。"
        required: false
        default: ""
      force:
        description: "是否强制刷新已有 K线；默认否，已有有效文件计为完成。"
        required: false
        default: false
        type: boolean
      force_universe:
        description: "是否强制刷新 market universe；默认否，同日完整清单会复用。"
        required: false
        default: false
        type: boolean
      universe:
        description: "股票范围：market=全市场，pool=当日池。"
        required: false
        default: "market"
        type: choice
        options:
          - market
          - pool
      engine:
        description: "抓取引擎：默认 aws-router；huaweicloud 可选，auto 会先尝试华为云。"
        required: false
        default: "aws-router"
        type: choice
        options:
          - auto
          - local
          - aws
          - aws-router
          - huaweicloud
      aws_region:
        description: "高级：AWS 区域列表，逗号分隔；一般留空使用配置轮询。"
        required: false
        default: ""
      huaweicloud_region:
        description: "高级：华为云区域列表或 all；一般留空使用 targets JSON 全部区域。"
        required: false
        default: ""
      lambda_name:
        description: "高级：Lambda 函数名；一般留空使用 kline。"
        required: false
        default: ""
      config:
        description: "高级：K线配置文件路径；一般留空。"
        required: false
        default: ""
      job_mode:
        description: "任务模式：batch=自动分批直到完成，single=只跑一轮。"
        required: false
        default: "batch"
        type: choice
        options:
          - batch
          - single
      job_id:
        description: "高级：恢复已有任务的 job id；一般留空自动生成。"
        required: false
        default: ""
      chain_depth:
        description: "高级：链式运行深度；手动首轮一般留空。"
        required: false
        default: ""
      max_chain_depth:
        description: "高级：最大链式运行次数；一般留空自动计算。"
        required: false
        default: ""
  schedule:
    - cron: "30 8 * * 1-5"

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: daily-data-commit
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        if: ${{ github.event.inputs.engine == 'aws' || github.event.inputs.engine == 'auto' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

      - name: AWS kline preflight
        if: ${{ github.event.inputs.engine == 'aws' }}
        run: node bin/x kline fetch 600519 --period daily --engine aws > /tmp/kline-aws-preflight.json

      - name: Huawei Cloud kline preflight
        if: ${{ github.event.inputs.engine == 'huaweicloud' }}
        env:
          HUAWEICLOUD_ACCESS_KEY: ${{ secrets.HUAWEICLOUD_ACCESS_KEY }}
          HUAWEICLOUD_SECRET_KEY: ${{ secrets.HUAWEICLOUD_SECRET_KEY }}
          HUAWEICLOUD_TARGETS_JSON: ${{ secrets.HUAWEICLOUD_TARGETS_JSON || vars.HUAWEICLOUD_TARGETS_JSON }}
          HUAWEICLOUD_REGION_INPUT: ${{ github.event.inputs.huaweicloud_region }}
        run: |
          args=(kline fetch 600519 --period daily --engine huaweicloud)
          if [ -n "${HUAWEICLOUD_REGION_INPUT}" ]; then
            args+=(--huaweicloud-region "${HUAWEICLOUD_REGION_INPUT}")
          fi
          node bin/x "${args[@]}" > /tmp/kline-huaweicloud-preflight.json

      - name: Run daily data workflow
        env:
          DATE_INPUT: ${{ github.event.inputs.date }}
          PERIOD_INPUT: ${{ github.event.inputs.period }}
          LIMIT_INPUT: ${{ github.event.inputs.limit }}
          BATCH_SIZE_INPUT: ${{ github.event.inputs.batch_size }}
          CONCURRENCY_INPUT: ${{ github.event.inputs.concurrency }}
          RETRY_ATTEMPTS_INPUT: ${{ github.event.inputs.retry_attempts }}
          RETRY_CONCURRENCY_INPUT: ${{ github.event.inputs.retry_concurrency }}
          MIN_SUCCESS_RATE_INPUT: ${{ github.event.inputs.min_success_rate }}
          FORCE_INPUT: ${{ github.event.inputs.force }}
          FORCE_UNIVERSE_INPUT: ${{ github.event.inputs.force_universe }}
          UNIVERSE_INPUT: ${{ github.event.inputs.universe }}
          ENGINE_INPUT: ${{ github.event.inputs.engine }}
          AWS_REGION_INPUT: ${{ github.event.inputs.aws_region }}
          HUAWEICLOUD_REGION_INPUT: ${{ github.event.inputs.huaweicloud_region }}
          LAMBDA_NAME_INPUT: ${{ github.event.inputs.lambda_name }}
          CONFIG_INPUT: ${{ github.event.inputs.config }}
          AWS_ROUTER_URL: ${{ secrets.AWS_ROUTER_URL }}
          AWS_ROUTER_TOKEN: ${{ secrets.AWS_ROUTER_TOKEN }}
          HUAWEICLOUD_ACCESS_KEY: ${{ secrets.HUAWEICLOUD_ACCESS_KEY }}
          HUAWEICLOUD_SECRET_KEY: ${{ secrets.HUAWEICLOUD_SECRET_KEY }}
          HUAWEICLOUD_TARGETS_JSON: ${{ secrets.HUAWEICLOUD_TARGETS_JSON || vars.HUAWEICLOUD_TARGETS_JSON }}
          JOB_MODE_INPUT: ${{ github.event.inputs.job_mode }}
          JOB_ID_INPUT: ${{ github.event.inputs.job_id }}
          CHAIN_DEPTH_INPUT: ${{ github.event.inputs.chain_depth }}
          MAX_CHAIN_DEPTH_INPUT: ${{ github.event.inputs.max_chain_depth }}
          GH_TOKEN: ${{ github.token }}
        run: node scripts/github-daily-workflow.js
