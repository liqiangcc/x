name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Node scripts
        run: |
          set -euo pipefail
          find fetch utils process -name '*.js' -print0 | xargs -0 -r -n1 node --check
          node --check bin/x

      - name: Check shell syntax
        run: |
          set -euo pipefail
          find . -name '*.sh' -not -path './.git/*' -print0 | xargs -0 -r -n1 bash -n

      - name: Check Python syntax
        run: |
          set -euo pipefail
          find . -name '*.py' -not -path './.git/*' -print0 | xargs -0 -r -n1 python3 -m py_compile

      - name: CLI smoke test
        run: |
          set -euo pipefail
          bin/x doctor
          bin/x --help
