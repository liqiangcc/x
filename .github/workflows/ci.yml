name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: CLI smoke test
        run: |
          bin/x doctor
          bin/x --help
